        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: value
          in: query
          type: boolean
          description: Set to `true` to enable the alert or `false` to disable the alert.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
