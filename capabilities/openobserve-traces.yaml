        method: GET
        description: Get recent user data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: stream_name
          in: path
          type: string
          description: Stream name
          required: true
        - name: filter
          in: query
          type: string
          description: 'filter, eg: a=b AND c=d'
        - name: from
          in: query
          type: integer
          description: from
          required: true
        - name: size
          in: query
          type: integer
          description: size
          required: true
        - name: start_time
          in: query
          type: integer
          description: start time
          required: true
        - name: end_time
          in: query
          type: integer
          description: end time
          required: true
        - name: timeout
