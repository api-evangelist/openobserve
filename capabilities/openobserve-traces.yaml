          in: path
          type: string
          description: Organization name
          required: true
        - name: stream_name
          in: path
          type: string
          description: Stream name
          required: true
        - name: filter
          in: query
          type: string
          description: 'filter, eg: a=b AND c=d'
        - name: from
          in: query
          type: integer
          description: from
          required: true
        - name: size
          in: query
          type: integer
          description: size
          required: true
        - name: start_time
          in: query
          type: integer
          description: start time
          required: true
        - name: end_time
          in: query
          type: integer
          description: end time
          required: true
        - name: timeout
          in: query
          type: integer
          description: timeout, seconds
        - name: sort_by
          in: query
          type: string
          description: 'sort by field: start_time, duration (default: start_time)'
        - name: sort_order
          in: query
          type: string
          description: 'sort order: asc, desc (default: desc)'
