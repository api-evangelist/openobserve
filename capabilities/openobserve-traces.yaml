          in: query
          type: integer
          description: start time in microseconds
          required: true
        - name: end_time
          in: query
          type: integer
          description: end time in microseconds
          required: true
        - name: timeout
          in: query
          type: integer
          description: timeout, seconds
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.OPENOBSERVE_API_KEY}}'
      placement: header
