naftiko: 1.0.0-alpha2
info:
  label: openobserve — Key
  description: 'openobserve — Key. 4 operations. Lead operation: List encryption keys. Self-contained Naftiko capability covering
    one Openobserve business surface.'
  tags:
  - Openobserve
  - Key
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENOBSERVE_API_KEY: OPENOBSERVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: openobserve-key
    baseUri: ''
    description: openobserve — Key business capability. Self-contained, no shared references.
    resources:
    - name: api-org_id-cipher_keys
      path: /api/{org_id}/cipher_keys
      operations:
      - name: listcipherkeys
        method: GET
        description: List encryption keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          required: true
      - name: createcipherkey
        method: POST
        description: Create encryption key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-org_id-cipher_keys-key_name
      path: /api/{org_id}/cipher_keys/{key_name}
      operations:
      - name: getcipherkey
        method: GET
        description: Get encryption key details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key_name
          in: path
          type: string
          description: Name of the key to retrieve
          required: true
        - name: org_id
          in: path
          type: string
          required: true
      - name: updatecipherkey
        method: PUT
        description: Update encryption key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: key_name
          in: path
          type: string
          description: name of the key to update
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.OPENOBSERVE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: openobserve-key-rest
    port: 8080
    description: REST adapter for openobserve — Key. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/{org-id}/cipher-keys
      name: api-org-id-cipher-keys
      description: REST surface for api-org_id-cipher_keys.
      operations:
      - method: GET
        name: listcipherkeys
        description: List encryption keys
        call: openobserve-key.listcipherkeys
        with:
          org_id: rest.org_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcipherkey
        description: Create encryption key
        call: openobserve-key.createcipherkey
        with:
          org_id: rest.org_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/{org-id}/cipher-keys/{key-name}
      name: api-org-id-cipher-keys-key-name
      description: REST surface for api-org_id-cipher_keys-key_name.
      operations:
      - method: GET
        name: getcipherkey
        description: Get encryption key details
        call: openobserve-key.getcipherkey
        with:
          key_name: rest.key_name
          org_id: rest.org_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatecipherkey
        description: Update encryption key
        call: openobserve-key.updatecipherkey
        with:
          org_id: rest.org_id
          key_name: rest.key_name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openobserve-key-mcp
    port: 9090
    transport: http
    description: MCP adapter for openobserve — Key. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-encryption-keys
      description: List encryption keys
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openobserve-key.listcipherkeys
      with:
        org_id: tools.org_id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-encryption-key
      description: Create encryption key
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: openobserve-key.createcipherkey
      with:
        org_id: tools.org_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-encryption-key-details
      description: Get encryption key details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openobserve-key.getcipherkey
      with:
        key_name: tools.key_name
        org_id: tools.org_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-encryption-key
      description: Update encryption key
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: openobserve-key.updatecipherkey
      with:
        org_id: tools.org_id
        key_name: tools.key_name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
