naftiko: 1.0.0-alpha2
info:
  label: openobserve — Dashboards
  description: 'openobserve — Dashboards. 15 operations. Lead operation: List organization dashboards. Self-contained Naftiko
    capability covering one Openobserve business surface.'
  tags:
  - Openobserve
  - Dashboards
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENOBSERVE_API_KEY: OPENOBSERVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: openobserve-dashboards
    baseUri: ''
    description: openobserve — Dashboards business capability. Self-contained, no shared references.
    resources:
    - name: api-org_id-dashboards
      path: /api/{org_id}/dashboards
      operations:
      - name: listdashboards
        method: GET
        description: List organization dashboards
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: folder
          in: query
          type: string
          description: Optional folder ID filter parameter
        - name: title
          in: query
          type: string
          description: The optional case-insensitive title substring with which to filter
        - name: pageSize
          in: query
          type: integer
          description: The optional number of dashboards to retrieve. If not set then all
      - name: createdashboard
        method: POST
        description: Create new dashboard
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: folder
          in: query
          type: string
          description: Folder ID where the dashboard will be created. Used for RBAC checks in enterprise version. Defaults
            to 'default' if not specified
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-org_id-dashboards-move
      path: /api/{org_id}/dashboards/move
      operations:
      - name: movedashboards
        method: PATCH
        description: Move multiple dashboards
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-org_id-dashboards-dashboard_id
      path: /api/{org_id}/dashboards/{dashboard_id}
      operations:
      - name: getdashboard
        method: GET
        description: Get dashboard details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: dashboard_id
          in: path
          type: string
          description: Dashboard ID
          required: true
        - name: folder
          in: query
          type: string
          description: Folder ID where the dashboard is located. Used for RBAC permission checks in enterprise version
      - name: updatedashboard
        method: PUT
        description: Update existing dashboard
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: dashboard_id
          in: path
          type: string
          description: Dashboard ID
          required: true
        - name: folder
          in: query
          type: string
          description: Folder ID where the dashboard is located
          required: true
        - name: hash
          in: query
          type: string
          description: Hash value for conflict detection. Required when updating an existing dashboard to prevent concurrent
            edit conflicts
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletedashboard
        method: DELETE
        description: Delete dashboard
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: dashboard_id
          in: path
          type: string
          description: Dashboard ID
          required: true
        - name: folder
          in: query
          type: string
          description: Folder ID where the dashboard is located. Used for RBAC permission checks in enterprise version
    - name: api-org_id-dashboards-dashboard_id-annotations
