        - name: hash
          in: query
          type: string
          description: Hash value for conflict detection
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletepanel
        method: DELETE
        description: Delete a single panel from a dashboard
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: dashboard_id
          in: path
          type: string
          description: Dashboard ID
          required: true
        - name: panel_id
          in: path
          type: string
          description: Panel ID
          required: true
        - name: folder
          in: query
          type: string
          description: Folder ID where the dashboard is located
        - name: hash
