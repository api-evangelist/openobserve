          type: object
          value: $.
        inputParameters:
        - name: panels
          in: query
          type: string
          description: Commas separated list of panels
        - name: start_time
          in: query
          type: integer
          description: Time in microseconds
          required: true
        - name: end_time
          in: query
          type: integer
          description: Time in microseconds
          required: true
        - name: org_id
          in: path
          type: string
          required: true
        - name: dashboard_id
          in: path
          type: string
          required: true
      - name: createannotations
        method: POST
        description: Create timed annotations for dashboard
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          required: true
        - name: dashboard_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteannotations
        method: DELETE
        description: Delete timed annotations from dashboard
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          required: true
        - name: dashboard_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
