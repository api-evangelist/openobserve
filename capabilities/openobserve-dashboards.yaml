          type: string
          required: true
        - name: dashboard_id
          in: path
          type: string
          required: true
        - name: timed_annotation_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-org_id-dashboards-dashboard_id-annotations-timed_annotation_id
      path: /api/{org_id}/dashboards/{dashboard_id}/annotations/{timed_annotation_id}
      operations:
      - name: updateannotations
        method: PUT
        description: Update timed annotation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          required: true
        - name: dashboard_id
          in: path
          type: string
          required: true
        - name: timed_annotation_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-org_id-dashboards-dashboard_id-panels
      path: /api/{org_id}/dashboards/{dashboard_id}/panels
      operations:
      - name: addpanel
        method: POST
        description: Add a panel to a dashboard
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: dashboard_id
          in: path
          type: string
          description: Dashboard ID
          required: true
        - name: folder
          in: query
          type: string
          description: Folder ID where the dashboard is located
        - name: hash
          in: query
          type: string
          description: Hash value for conflict detection
