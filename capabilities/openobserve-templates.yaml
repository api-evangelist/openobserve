        name: updatetemplate
        description: Update alert template
        call: openobserve-templates.updatetemplate
        with:
          org_id: rest.org_id
          template_name: rest.template_name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
