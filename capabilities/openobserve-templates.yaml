      path: /api/{org_id}/alerts/templates
      operations:
      - name: listtemplates
        method: GET
        description: List alert templates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
      - name: createtemplate
        method: POST
        description: Create alert template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-org_id-alerts-templates-system-prebuilt
      path: /api/{org_id}/alerts/templates/system/prebuilt
      operations:
      - name: getsystemtemplates
        method: GET
        description: Get system prebuilt templates
