        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
    - name: api-org_id-alerts-templates-template_name
      path: /api/{org_id}/alerts/templates/{template_name}
      operations:
      - name: gettemplate
        method: GET
        description: Get alert template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: template_name
          in: path
          type: string
          description: Template name
          required: true
      - name: updatetemplate
        method: PUT
        description: Update alert template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: template_name
          in: path
          type: string
          description: Template name
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
