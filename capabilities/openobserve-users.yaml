naftiko: 1.0.0-alpha2
info:
  label: openobserve — Users
  description: 'openobserve — Users. 5 operations. Lead operation: List organization users. Self-contained Naftiko capability
    covering one Openobserve business surface.'
  tags:
  - Openobserve
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENOBSERVE_API_KEY: OPENOBSERVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: openobserve-users
    baseUri: ''
    description: openobserve — Users business capability. Self-contained, no shared references.
    resources:
    - name: api-org_id-users
      path: /api/{org_id}/users
      operations:
      - name: userlist
        method: GET
        description: List organization users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
      - name: usersave
        method: POST
        description: Create new user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-org_id-users-email_id
      path: /api/{org_id}/users/{email_id}
      operations:
      - name: userupdate
        method: PUT
        description: Update user account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: email_id
          in: path
          type: string
          description: User's email id
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: addusertoorg
        method: POST
        description: Add user to organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: email_id
          in: path
          type: string
          description: User's email id
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removeuserfromorg
        method: DELETE
        description: Remove user from organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: email_id
          in: path
          type: string
          description: User name
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.OPENOBSERVE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: openobserve-users-rest
    port: 8080
    description: REST adapter for openobserve — Users. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/{org-id}/users
      name: api-org-id-users
      description: REST surface for api-org_id-users.
      operations:
      - method: GET
        name: userlist
        description: List organization users
        call: openobserve-users.userlist
        with:
          org_id: rest.org_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: usersave
        description: Create new user
        call: openobserve-users.usersave
        with:
          org_id: rest.org_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/{org-id}/users/{email-id}
      name: api-org-id-users-email-id
      description: REST surface for api-org_id-users-email_id.
      operations:
      - method: PUT
        name: userupdate
        description: Update user account
        call: openobserve-users.userupdate
        with:
          org_id: rest.org_id
          email_id: rest.email_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addusertoorg
        description: Add user to organization
        call: openobserve-users.addusertoorg
        with:
          org_id: rest.org_id
          email_id: rest.email_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removeuserfromorg
        description: Remove user from organization
        call: openobserve-users.removeuserfromorg
        with:
          org_id: rest.org_id
          email_id: rest.email_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openobserve-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for openobserve — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-organization-users
      description: List organization users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openobserve-users.userlist
      with:
        org_id: tools.org_id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-user
      description: Create new user
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: openobserve-users.usersave
      with:
        org_id: tools.org_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-user-account
      description: Update user account
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: openobserve-users.userupdate
      with:
        org_id: tools.org_id
        email_id: tools.email_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: add-user-organization
      description: Add user to organization
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: openobserve-users.addusertoorg
      with:
        org_id: tools.org_id
        email_id: tools.email_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-user-organization
      description: Remove user from organization
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: openobserve-users.removeuserfromorg
      with:
        org_id: tools.org_id
        email_id: tools.email_id
      outputParameters:
      - type: object
        mapping: $.
