      description: REST surface for api-org_id-actions-upload.
      operations:
      - method: POST
        name: uploadzippedaction
        description: Upload automated action package
        call: openobserve-actions.uploadzippedaction
        with:
          org_id: rest.org_id
        outputParameters:
        - type: object
