          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: ksuid
          in: path
          type: string
          description: Action ID
          required: true
    - name: api-org_id-actions-upload
      path: /api/{org_id}/actions/upload
