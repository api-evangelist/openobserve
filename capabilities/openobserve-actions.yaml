          in: path
          type: string
          description: Organization name
          required: true
    - name: api-org_id-actions-action_id
      path: /api/{org_id}/actions/{action_id}
      operations:
      - name: getaction
        method: GET
        description: Get automated action details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: action_id
          in: path
          type: string
          description: Action ID
          required: true
      - name: updateaction
        method: PUT
        description: Update automated action
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: action_id
          in: path
          type: string
          description: Action ID
          required: true
