naftiko: 1.0.0-alpha2
info:
  label: openobserve — Reports
  description: 'openobserve — Reports. 15 operations. Lead operation: List dashboard reports (v2). Self-contained Naftiko
    capability covering one Openobserve business surface.'
  tags:
  - Openobserve
  - Reports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENOBSERVE_API_KEY: OPENOBSERVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: openobserve-reports
    baseUri: ''
    description: openobserve — Reports business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-org_id-reports
      path: /api/v2/{org_id}/reports
      operations:
      - name: listreportsv2
        method: GET
        description: List dashboard reports (v2)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: folder
          in: query
          type: string
          description: Folder ID filter
        - name: dashboard_id
          in: query
          type: string
          description: Dashboard ID filter
        - name: cache
          in: query
          type: boolean
          description: Filter destination-less (cache) reports
      - name: createreportv2
        method: POST
        description: Create dashboard report (v2)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: folder
          in: query
          type: string
          description: Folder ID (defaults to 'default')
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-org_id-reports-bulk
      path: /api/v2/{org_id}/reports/bulk
      operations:
      - name: deletereportbulkv2
        method: DELETE
        description: Delete multiple dashboard reports by ID (v2)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-org_id-reports-move
      path: /api/v2/{org_id}/reports/move
      operations:
      - name: movereports
        method: PATCH
        description: Move reports between folders (v2)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-org_id-reports-report_id
      path: /api/v2/{org_id}/reports/{report_id}
      operations:
      - name: getreportv2
        method: GET
        description: Get dashboard report by ID (v2)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: report_id
          in: path
          type: string
          description: Report ID (KSUID)
          required: true
      - name: updatereportv2
        method: PUT
        description: Update dashboard report by ID (v2)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: report_id
          in: path
          type: string
          description: Report ID (KSUID)
          required: true
        - name: folder
          in: query
          type: string
          description: Move to this folder ID
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletereportv2
        method: DELETE
        description: Delete dashboard report by ID (v2)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: report_id
          in: path
          type: string
          description: Report ID (KSUID)
          required: true
    - name: api-v2-org_id-reports-report_id-enable
      path: /api/v2/{org_id}/reports/{report_id}/enable
      operations:
      - name: enablereportv2
        method: PATCH
        description: Enable or disable a report by ID (v2)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: report_id
          in: path
          type: string
          description: Report ID (KSUID)
          required: true
        - name: value
          in: query
          type: boolean
          description: true to enable, false to disable
          required: true
    - name: api-v2-org_id-reports-report_id-trigger
