        destructive: false
        idempotent: true
      call: openobserve-metrics.prometheusformatquery
      with:
        query: tools.query
        org_id: tools.org_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-label-values
      description: Get label values
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openobserve-metrics.prometheuslabelvalues
