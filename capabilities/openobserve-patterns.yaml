naftiko: 1.0.0-alpha2
info:
  label: openobserve — Patterns
  description: 'openobserve — Patterns. 1 operations. Lead operation: Extract patterns from search results. Self-contained
    Naftiko capability covering one Openobserve business surface.'
  tags:
  - Openobserve
  - Patterns
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENOBSERVE_API_KEY: OPENOBSERVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: openobserve-patterns
    baseUri: ''
    description: openobserve — Patterns business capability. Self-contained, no shared references.
    resources:
    - name: api-org_id-streams-stream_name-patterns-extract
      path: /api/{org_id}/streams/{stream_name}/patterns/extract
      operations:
      - name: extractpatterns
        method: POST
        description: Extract patterns from search results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: stream_name
          in: path
          type: string
          description: Stream name
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.OPENOBSERVE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: openobserve-patterns-rest
    port: 8080
    description: REST adapter for openobserve — Patterns. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/{org-id}/streams/{stream-name}/patterns/extract
      name: api-org-id-streams-stream-name-patterns-extract
      description: REST surface for api-org_id-streams-stream_name-patterns-extract.
      operations:
      - method: POST
        name: extractpatterns
        description: Extract patterns from search results
        call: openobserve-patterns.extractpatterns
        with:
          org_id: rest.org_id
          stream_name: rest.stream_name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openobserve-patterns-mcp
    port: 9090
    transport: http
    description: MCP adapter for openobserve — Patterns. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: extract-patterns-search-results
      description: Extract patterns from search results
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: openobserve-patterns.extractpatterns
      with:
        org_id: tools.org_id
        stream_name: tools.stream_name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
