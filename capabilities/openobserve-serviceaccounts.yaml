naftiko: 1.0.0-alpha2
info:
  label: openobserve — ServiceAccounts
  description: 'openobserve — ServiceAccounts. 4 operations. Lead operation: List service accounts. Self-contained Naftiko
    capability covering one Openobserve business surface.'
  tags:
  - Openobserve
  - ServiceAccounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENOBSERVE_API_KEY: OPENOBSERVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: openobserve-serviceaccounts
    baseUri: ''
    description: openobserve — ServiceAccounts business capability. Self-contained, no shared references.
    resources:
    - name: api-org_id-service_accounts
      path: /api/{org_id}/service_accounts
      operations:
      - name: serviceaccountslist
        method: GET
        description: List service accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
      - name: serviceaccountsave
        method: POST
        description: Create service account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-org_id-service_accounts-email_id
      path: /api/{org_id}/service_accounts/{email_id}
      operations:
      - name: serviceaccountupdate
        method: PUT
        description: Update service account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: email_id
          in: path
          type: string
          description: Service Account email id
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removeserviceaccount
        method: DELETE
        description: Delete service account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: email_id
          in: path
          type: string
          description: Service Account email id
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.OPENOBSERVE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: openobserve-serviceaccounts-rest
    port: 8080
    description: REST adapter for openobserve — ServiceAccounts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/{org-id}/service-accounts
      name: api-org-id-service-accounts
      description: REST surface for api-org_id-service_accounts.
      operations:
      - method: GET
        name: serviceaccountslist
        description: List service accounts
        call: openobserve-serviceaccounts.serviceaccountslist
        with:
          org_id: rest.org_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: serviceaccountsave
        description: Create service account
        call: openobserve-serviceaccounts.serviceaccountsave
        with:
          org_id: rest.org_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/{org-id}/service-accounts/{email-id}
      name: api-org-id-service-accounts-email-id
      description: REST surface for api-org_id-service_accounts-email_id.
      operations:
      - method: PUT
        name: serviceaccountupdate
        description: Update service account
        call: openobserve-serviceaccounts.serviceaccountupdate
        with:
          org_id: rest.org_id
          email_id: rest.email_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removeserviceaccount
        description: Delete service account
        call: openobserve-serviceaccounts.removeserviceaccount
        with:
          org_id: rest.org_id
          email_id: rest.email_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openobserve-serviceaccounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for openobserve — ServiceAccounts. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-service-accounts
      description: List service accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openobserve-serviceaccounts.serviceaccountslist
      with:
        org_id: tools.org_id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-service-account
      description: Create service account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: openobserve-serviceaccounts.serviceaccountsave
      with:
        org_id: tools.org_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-service-account
      description: Update service account
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: openobserve-serviceaccounts.serviceaccountupdate
      with:
        org_id: tools.org_id
        email_id: tools.email_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-service-account
      description: Delete service account
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: openobserve-serviceaccounts.removeserviceaccount
      with:
        org_id: tools.org_id
        email_id: tools.email_id
      outputParameters:
      - type: object
        mapping: $.
