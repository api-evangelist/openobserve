naftiko: 1.0.0-alpha2
info:
  label: openobserve — Saved Views
  description: 'openobserve — Saved Views. 5 operations. Lead operation: List saved views. Self-contained Naftiko capability
    covering one Openobserve business surface.'
  tags:
  - Openobserve
  - Saved Views
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENOBSERVE_API_KEY: OPENOBSERVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: openobserve-saved-views
    baseUri: ''
    description: openobserve — Saved Views business capability. Self-contained, no shared references.
    resources:
    - name: api-org_id-savedviews
      path: /api/{org_id}/savedviews
      operations:
      - name: listsavedviews
        method: GET
        description: List saved views
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
      - name: createsavedviews
        method: POST
        description: Create a new saved view
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-org_id-savedviews-view_id
      path: /api/{org_id}/savedviews/{view_id}
      operations:
      - name: getsavedview
        method: GET
        description: Get saved view
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: view_id
          in: path
          type: string
          description: The view_id which was stored
          required: true
      - name: updatesavedviews
        method: PUT
        description: Update an existing saved view
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: view_id
          in: path
          type: string
          description: View id to be updated
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesavedviews
        method: DELETE
        description: Delete saved view
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: view_id
          in: path
          type: string
          description: The view_id to delete
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.OPENOBSERVE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: openobserve-saved-views-rest
    port: 8080
    description: REST adapter for openobserve — Saved Views. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/{org-id}/savedviews
      name: api-org-id-savedviews
      description: REST surface for api-org_id-savedviews.
      operations:
      - method: GET
        name: listsavedviews
        description: List saved views
        call: openobserve-saved-views.listsavedviews
        with:
          org_id: rest.org_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsavedviews
        description: Create a new saved view
        call: openobserve-saved-views.createsavedviews
        with:
          org_id: rest.org_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/{org-id}/savedviews/{view-id}
      name: api-org-id-savedviews-view-id
      description: REST surface for api-org_id-savedviews-view_id.
      operations:
      - method: GET
        name: getsavedview
        description: Get saved view
        call: openobserve-saved-views.getsavedview
        with:
          org_id: rest.org_id
          view_id: rest.view_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesavedviews
        description: Update an existing saved view
        call: openobserve-saved-views.updatesavedviews
        with:
          org_id: rest.org_id
          view_id: rest.view_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesavedviews
        description: Delete saved view
        call: openobserve-saved-views.deletesavedviews
        with:
          org_id: rest.org_id
          view_id: rest.view_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openobserve-saved-views-mcp
    port: 9090
    transport: http
    description: MCP adapter for openobserve — Saved Views. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-saved-views
      description: List saved views
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openobserve-saved-views.listsavedviews
      with:
        org_id: tools.org_id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-saved-view
      description: Create a new saved view
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: openobserve-saved-views.createsavedviews
      with:
        org_id: tools.org_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-saved-view
      description: Get saved view
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openobserve-saved-views.getsavedview
      with:
        org_id: tools.org_id
        view_id: tools.view_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-existing-saved-view
      description: Update an existing saved view
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: openobserve-saved-views.updatesavedviews
      with:
        org_id: tools.org_id
        view_id: tools.view_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-saved-view
      description: Delete saved view
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: openobserve-saved-views.deletesavedviews
      with:
        org_id: tools.org_id
        view_id: tools.view_id
      outputParameters:
      - type: object
        mapping: $.
