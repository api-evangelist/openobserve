naftiko: 1.0.0-alpha2
info:
  label: openobserve — Meta
  description: 'openobserve — Meta. 1 operations. Lead operation: System health check. Self-contained Naftiko capability covering
    one Openobserve business surface.'
  tags:
  - Openobserve
  - Meta
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENOBSERVE_API_KEY: OPENOBSERVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: openobserve-meta
    baseUri: ''
    description: openobserve — Meta business capability. Self-contained, no shared references.
    resources:
    - name: healthz
      path: /healthz
      operations:
      - name: healthcheck
        method: GET
        description: System health check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.OPENOBSERVE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: openobserve-meta-rest
    port: 8080
    description: REST adapter for openobserve — Meta. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/healthz
      name: healthz
      description: REST surface for healthz.
      operations:
      - method: GET
        name: healthcheck
        description: System health check
        call: openobserve-meta.healthcheck
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openobserve-meta-mcp
    port: 9090
    transport: http
    description: MCP adapter for openobserve — Meta. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: system-health-check
      description: System health check
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openobserve-meta.healthcheck
      outputParameters:
      - type: object
        mapping: $.
