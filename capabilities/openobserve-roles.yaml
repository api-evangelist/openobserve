    port: 9090
    transport: http
    description: MCP adapter for openobserve — Roles. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-organization-roles
      description: List organization roles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openobserve-roles.listroles
      with:
        org_id: tools.org_id
