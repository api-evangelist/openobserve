      name: api-org-id-roles-role-id-permissions-resource
      description: REST surface for api-org_id-roles-role_id-permissions-resource.
      operations:
      - method: GET
        name: getresourcepermission
        description: Get role permissions for resource
        call: openobserve-roles.getresourcepermission
        with:
          org_id: rest.org_id
          role_id: rest.role_id
          resource: rest.resource
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/{org-id}/roles/{role-id}/users
      name: api-org-id-roles-role-id-users
      description: REST surface for api-org_id-roles-role_id-users.
      operations:
      - method: GET
        name: getroleusers
        description: Get users assigned to role
        call: openobserve-roles.getroleusers
        with:
          org_id: rest.org_id
          role_id: rest.role_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
