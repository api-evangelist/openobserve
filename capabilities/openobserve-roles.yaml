        role_id: tools.role_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-role-permissions-resource
      description: Get role permissions for resource
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openobserve-roles.getresourcepermission
      with:
        org_id: tools.org_id
        role_id: tools.role_id
        resource: tools.resource
      outputParameters:
      - type: object
        mapping: $.
    - name: get-users-assigned-role
      description: Get users assigned to role
      hints:
        readOnly: true
        destructive: false
        idempotent: true
