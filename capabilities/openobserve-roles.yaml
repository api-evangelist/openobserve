    resources:
    - name: api-org_id-roles
      path: /api/{org_id}/roles
      operations:
      - name: listroles
        method: GET
        description: List organization roles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
      - name: createroles
        method: POST
        description: Create custom role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-org_id-roles-role_id
      path: /api/{org_id}/roles/{role_id}
      operations:
      - name: updateroles
        method: PUT
        description: Update role permissions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: role_id
          in: path
          type: string
          description: Role Id
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleterole
        method: DELETE
        description: Delete custom role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: role_id
          in: path
          type: string
          description: Role Id
          required: true
    - name: api-org_id-roles-role_id-permissions-resource
      path: /api/{org_id}/roles/{role_id}/permissions/{resource}
      operations:
      - name: getresourcepermission
        method: GET
        description: Get role permissions for resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: role_id
          in: path
          type: string
          description: Role Id
          required: true
        - name: resource
          in: path
          type: string
          description: resource
          required: true
    - name: api-org_id-roles-role_id-users
      path: /api/{org_id}/roles/{role_id}/users
      operations:
      - name: getroleusers
        method: GET
        description: Get users assigned to role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Organization name
          required: true
        - name: role_id
          in: path
          type: string
          description: Role Id
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.OPENOBSERVE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: openobserve-roles-rest
    port: 8080
    description: REST adapter for openobserve — Roles. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/{org-id}/roles
      name: api-org-id-roles
      description: REST surface for api-org_id-roles.
      operations:
      - method: GET
        name: listroles
        description: List organization roles
        call: openobserve-roles.listroles
        with:
          org_id: rest.org_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createroles
        description: Create custom role
        call: openobserve-roles.createroles
        with:
          org_id: rest.org_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/{org-id}/roles/{role-id}
      name: api-org-id-roles-role-id
      description: REST surface for api-org_id-roles-role_id.
      operations:
