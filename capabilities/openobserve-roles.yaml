        name: updateroles
        description: Update role permissions
        call: openobserve-roles.updateroles
        with:
          org_id: rest.org_id
          role_id: rest.role_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleterole
        description: Delete custom role
        call: openobserve-roles.deleterole
        with:
          org_id: rest.org_id
          role_id: rest.role_id
        outputParameters:
        - type: object
          mapping: $.
