aid: openobserve
name: OpenObserve
description: >-
  OpenObserve is an open source petabyte-scale observability platform with unified logs, metrics, traces, and front-end
  telemetry in a single UI with SQL and PromQL querying. The HTTP API exposes ingestion, search, alerting, dashboards,
  pipelines, RUM, and administration endpoints.
