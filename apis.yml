apis:
  - aid: openobserve:openobserve
    name: OpenObserve
    description: >-
      OpenObserve HTTP API for ingesting logs, metrics, and traces; running
      SQL and PromQL search; managing alerts, dashboards, folders, pipelines,
      reports, RUM, saved views, service streams, and short URLs; and
      administering organizations, users, roles, groups, service accounts,
      rate limits, and meta resources.
