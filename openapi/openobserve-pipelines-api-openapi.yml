          format: float
    PipelineSource:
      oneOf:
      - allOf:
        - $ref: '#/components/schemas/StreamParams'
          description: 'Real-time pipeline: processes data immediately as it''s ingested.

            Example: { "source_type": "realtime" }'
        - type: object
          required:
          - source_type
          properties:
            source_type:
              type: string
              enum:
              - realtime
        description: 'Real-time pipeline: processes data immediately as it''s ingested.

          Example: { "source_type": "realtime" }'
      - allOf:
        - $ref: '#/components/schemas/DerivedStream'
          description: 'Scheduled pipeline: runs periodically based on trigger_condition.

            Example: { "source_type": "scheduled", "org_id": "default", "stream_type": "logs",

            "query_condition": {...}, "trigger_condition": {...} }'
        - type: object
          required:
          - source_type
          properties:
            source_type:
              type: string
              enum:
              - scheduled
        description: 'Scheduled pipeline: runs periodically based on trigger_condition.

          Example: { "source_type": "scheduled", "org_id": "default", "stream_type": "logs",

          "query_condition": {...}, "trigger_condition": {...} }'
      description: 'Pipeline source type determines when the pipeline runs.

        Use "realtime" for processing data as it arrives, "scheduled" for periodic batch processing.'
