          - boolean
          - 'null'
        filters: {}
        folder_id:
          type:
          - string
          - 'null'
        histogram_interval:
          type:
          - string
          - 'null'
        name:
          type:
          - string
          - 'null'
        owner:
          type:
          - string
          - 'null'
        percentile:
          type:
          - number
          - 'null'
          format: double
        query_mode:
