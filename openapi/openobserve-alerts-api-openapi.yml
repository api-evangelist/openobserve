  /api/{org_id}/alerts/destinations:
    get:
      tags:
      - Alerts
      summary: List alert destinations
      description: Retrieves a list of all alert destinations configured for an organization. Optionally filter by module type (alert or pipeline) to get specific destination categories. Returns destination names, types, and basic configuration details to help administrators manage notification routing and review available delivery options.
      operationId: ListDestinations
      parameters:
      - name: org_id
        in: path
        description: Organization name
        required: true
        schema:
          type: string
      - name: module
        in: query
        description: Destination module filter, none, alert, or pipeline
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: "Alert destination configuration for sending notifications when alerts trigger.\n\nIMPORTANT: The `template` field is REQUIRED to create an alert destination.\nWithout a template, the destination becomes a pipeline destination and cannot be used with\nalerts.\n\n# Example - Creating an HTTP alert destination\n```json\n{\n  \"name\": \"my_alert_webhook\",\n  \"url\": \"https://example.com/webhook\",\n  \"method\": \"post\",\n  \"type\": \"http\",\n  \"template\": \"Default\",\n  \"skip_tls_verify\": false\n}\n```\n\n# Example - Creating an Email alert destination\n```json\n{\n  \"name\": \"my_email_dest\",\n  \"type\": \"email\",\n  \"emails\": [\"alerts@example.com\", \"team@example.com\"],\n  \"template\": \"Default\"\n}\n```"
                  properties:
                    action_id:
                      type:
                      - string
                      - 'null'
                      description: Action ID for enterprise Action destinations. Required when `type` is `action`.
                    aws_region:
                      type:
                      - string
                      - 'null'
                      description: AWS region for SNS destinations. Required when `type` is `sns`.
                    destination_type_name:
                      type:
                      - string
                      - 'null'
                      description: Specific destination type identifier (e.g., "openobserve", "splunk", "elasticsearch").
                    emails:
                      type: array
                      items:
                        type: string
                      description: Email recipients for Email destinations. Required when `type` is `email`.
                    headers:
                      type:
                      - object
                      - 'null'
                      description: Optional HTTP headers to include with webhook requests.
                      additionalProperties:
                        type: string
                      propertyNames:
                        type: string
                    metadata:
                      type: object
                      description: Optional key-value metadata for the destination.
                      additionalProperties:
                        type: string
                      propertyNames:
                        type: string
                    method:
                      $ref: '#/components/schemas/HTTPType'
                      description: HTTP method for HTTP destinations. Typically "post" for webhooks.
                    name:
                      type: string
                      description: Unique name for this destination. Must be unique within the organization.
                      example: my_alert_webhook
                    output_format:
                      oneOf:
                      - type: 'null'
                      - $ref: '#/components/schemas/HTTPOutputFormat'
                        description: Output format for HTTP destinations (json or text). Default is json.
                    skip_tls_verify:
                      type: boolean
                      description: Whether to skip TLS certificate verification for HTTP destinations.
                    sns_topic_arn:
                      type:
                      - string
                      - 'null'
                      description: SNS topic ARN for SNS destinations. Required when `type` is `sns`.
                    template:
                      type:
                      - string
                      - 'null'
                      description: 'REQUIRED for alert destinations. Name of the template to use for formatting alert messages.

                        Use "Default" for the built-in default template. Without a template, the destination

                        becomes a pipeline destination and cannot be used with alerts.'
                      example: Default
                    type:
                      $ref: '#/components/schemas/DestinationType'
                      description: 'Destination type: `http` (webhook), `email`, or `sns`. Default is `http`.'
                    url:
                      type: string
                      description: Webhook URL for HTTP destinations. Required when `type` is `http`.
                      example: https://example.com/webhook
        '400':
          description: Error
          content:
            application/json:
              schema:
                default: null
      security:
      - Authorization: []
      x-o2-mcp:
        description: List all alert destinations
        category: alerts
        summary_fields:
        - name
        - type
        - template
      x-o2-ratelimit:
        module: Destinations
        operation: list
    post:
      tags:
      - Alerts
      summary: Create alert or pipeline destination
      description: 'Creates a new alert destination configuration for an organization. Destinations define where alert notifications are sent when alert conditions are met, including webhooks, email addresses, and SNS topics.


        IMPORTANT: The `template` field is REQUIRED to create an alert destination. Use ''Default'' for the built-in template. For pipeline destinations, this includes external systems like OpenObserve, Splunk, Elasticsearch, etc. Use the ''module'' query parameter to specify destination type: ''alert'' (default) or ''pipeline''.


        Without a template, the destination becomes a pipeline destination and cannot be used with alerts.


        Example HTTP destination:


        ```json

        {"name": "my_webhook", "url": "https://example.com/webhook", "method": "post", "type": "http", "template": "Default"}

        ```


        Example Email destination:

        ```json

        {"name": "my_email", "type": "email", "emails": ["alerts@example.com"], "template": "Default"}

        ```'
      operationId: CreateDestination
      parameters:
      - name: org_id
        in: path
        description: Organization name
        required: true
        schema:
          type: string
      - name: module
        in: query
        description: 'Destination module type: ''alert'' (default) or ''pipeline'''
        required: false
        schema:
          type: string
      requestBody:
        description: Alert destination data. The 'template' field is required (use 'Default' for the built-in template).
        content:
          application/json:
            schema:
              type: object
              description: "Alert destination configuration for sending notifications when alerts trigger.\n\nIMPORTANT: The `template` field is REQUIRED to create an alert destination.\nWithout a template, the destination becomes a pipeline destination and cannot be used with\nalerts.\n\n# Example - Creating an HTTP alert destination\n```json\n{\n  \"name\": \"my_alert_webhook\",\n  \"url\": \"https://example.com/webhook\",\n  \"method\": \"post\",\n  \"type\": \"http\",\n  \"template\": \"Default\",\n  \"skip_tls_verify\": false\n}\n```\n\n# Example - Creating an Email alert destination\n```json\n{\n  \"name\": \"my_email_dest\",\n  \"type\": \"email\",\n  \"emails\": [\"alerts@example.com\", \"team@example.com\"],\n  \"template\": \"Default\"\n}\n```"
              properties:
                action_id:
                  type:
                  - string
                  - 'null'
                  description: Action ID for enterprise Action destinations. Required when `type` is `action`.
                aws_region:
                  type:
                  - string
                  - 'null'
                  description: AWS region for SNS destinations. Required when `type` is `sns`.
                destination_type_name:
                  type:
                  - string
                  - 'null'
                  description: Specific destination type identifier (e.g., "openobserve", "splunk", "elasticsearch").
                emails:
                  type: array
                  items:
                    type: string
                  description: Email recipients for Email destinations. Required when `type` is `email`.
                headers:
                  type:
                  - object
                  - 'null'
                  description: Optional HTTP headers to include with webhook requests.
                  additionalProperties:
                    type: string
                  propertyNames:
                    type: string
                metadata:
                  type: object
                  description: Optional key-value metadata for the destination.
                  additionalProperties:
                    type: string
                  propertyNames:
                    type: string
                method:
                  $ref: '#/components/schemas/HTTPType'
                  description: HTTP method for HTTP destinations. Typically "post" for webhooks.
                name:
                  type: string
                  description: Unique name for this destination. Must be unique within the organization.
                  example: my_alert_webhook
                output_format:
                  oneOf:
                  - type: 'null'
                  - $ref: '#/components/schemas/HTTPOutputFormat'
                    description: Output format for HTTP destinations (json or text). Default is json.
                skip_tls_verify:
                  type: boolean
                  description: Whether to skip TLS certificate verification for HTTP destinations.
                sns_topic_arn:
                  type:
                  - string
                  - 'null'
                  description: SNS topic ARN for SNS destinations. Required when `type` is `sns`.
                template:
                  type:
                  - string
                  - 'null'
                  description: 'REQUIRED for alert destinations. Name of the template to use for formatting alert messages.

                    Use "Default" for the built-in default template. Without a template, the destination

                    becomes a pipeline destination and cannot be used with alerts.'
                  example: Default
                type:
                  $ref: '#/components/schemas/DestinationType'
                  description: 'Destination type: `http` (webhook), `email`, or `sns`. Default is `http`.'
                url:
                  type: string
                  description: Webhook URL for HTTP destinations. Required when `type` is `http`.
                  example: https://example.com/webhook
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Error
          content:
            application/json:
              schema:
                default: null
      security:
      - Authorization: []
      x-o2-mcp:
        description: Create alert/pipeline destination, alert destination must have a template
        category: alerts
      x-o2-ratelimit:
        module: Destinations
        operation: create
