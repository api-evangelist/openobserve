      - email
      - sns
      - action
    TriggerCondition:
      type: object
      properties:
        align_time:
          type: boolean
          default: false
        cron:
          type: string
          default: ''
        frequency:
          type: integer
          format: int64
          description: (seconds)
          default: 0
        frequency_type:
          oneOf:
          - $ref: '#/components/schemas/FrequencyType'
          default: minutes
        operator:
          oneOf:
          - $ref: '#/components/schemas/Operator'
          default: '='
        period:
          type: integer
          format: int64
          description: (minutes)
          default: 0
        silence:
          type: integer
          format: int64
          description: (minutes)
          default: 0
        threshold:
          type: integer
          format: int64
          default: 0
        timezone:
          type:
          - string
          - 'null'
          default: null
        tolerance_in_secs:
          type:
          - integer
          - 'null'
          format: int64
          description: (seconds)
          default: null
    SemanticGroupDiff:
      type: object
      required:
