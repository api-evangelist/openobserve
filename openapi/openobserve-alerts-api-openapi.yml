                  description: Webhook URL for HTTP destinations. Required when `type` is `http`.
                  example: https://example.com/webhook
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Error
          content:
            application/json:
              schema:
                default: null
      security:
      - Authorization: []
      x-o2-mcp:
        description: Update alert destination
        category: alerts
      x-o2-ratelimit:
        module: Destinations
        operation: update
    delete:
      tags:
      - Alerts
      summary: Delete alert destination
      description: Removes an alert destination configuration from the organization. The destination must not be in use by any active alerts or pipelines before deletion. Once deleted, any alerts previously configured to use this destination will need to be updated with alternative notification methods to continue functioning.
      operationId: DeleteAlertDestination
      parameters:
      - name: org_id
        in: path
        description: Organization name
        required: true
        schema:
          type: string
      - name: destination_name
        in: path
        description: Destination name
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        '404':
          description: NotFound
          content:
            application/json:
              schema:
                default: null
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                default: null
        '500':
          description: Failure
          content:
            application/json:
              schema:
                default: null
      security:
      - Authorization: []
      x-o2-mcp:
        description: Delete alert destination
        category: alerts
        requires_confirmation: true
      x-o2-ratelimit:
        module: Destinations
        operation: delete
  /api/{org_id}/alerts/history:
    get:
      tags:
      - Alerts
      summary: Get alert execution history
      description: Retrieves the execution history of alerts for the organization. This endpoint queries the organization's own triggers stream to provide details about when alerts were triggered, their status, and execution details.
      operationId: GetAlertHistory
      parameters:
      - name: org_id
        in: path
        description: Organization name
        required: true
        schema:
          type: string
      - name: alert_id
        in: query
        description: Filter by specific alert id
        required: false
        schema:
          type: string
      - name: start_time
        in: query
        description: Start time in Unix timestamp microseconds
        required: false
        schema:
          type: integer
          format: int64
      - name: end_time
        in: query
        description: End time in Unix timestamp microseconds
        required: false
        schema:
          type: integer
          format: int64
      - name: from
        in: query
        description: 'Pagination offset (default: 0)'
        required: false
        schema:
          type: integer
          format: int64
      - name: size
        in: query
        description: 'Number of results to return (default: 100, max: 1000)'
        required: false
        schema:
          type: integer
          format: int64
      - name: sort_by
        in: query
        description: 'Field to sort by: timestamp, alert_name, status, is_realtime, is_silenced, start_time, end_time, duration, retries, delay_in_secs, evaluation_took_in_secs, source_node, query_took (default: timestamp)'
        required: false
        schema:
          type: string
      - name: sort_order
        in: query
        description: 'Sort order: asc or desc (default: desc)'
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                - total
                - from
                - size
                - hits
                properties:
                  from:
                    type: integer
                    format: int64
                  hits:
                    type: array
                    items:
                      $ref: '#/components/schemas/AlertHistoryEntry'
                  size:
                    type: integer
                    format: int64
                  total:
                    type: integer
                    minimum: 0
        '400':
          description: Bad Request
          content:
            application/json: {}
        '403':
          description: Forbidden
          content:
            application/json: {}
        '500':
          description: Internal Server Error
          content:
            application/json: {}
      security:
      - Authorization: []
components:
  schemas:
    AlertTypeFilter:
      type: string
      description: Filters the alert list by alert type (scheduled, realtime, anomaly detection, or all).
      enum:
      - all
      - scheduled
      - realtime
      - anomaly_detection
    GroupingConfig:
      type: object
      description: Configuration for alert grouping
      properties:
        enabled:
          type: boolean
          description: Enable alert grouping
        group_wait_seconds:
          type: integer
          format: int64
          description: Initial wait time before sending first notification (seconds)
        max_group_size:
          type: integer
          description: Maximum number of alerts in a single group
          minimum: 0
        send_strategy:
          $ref: '#/components/schemas/SendStrategy'
          description: How to send grouped notifications
    QueryCondition:
      type: object
      properties:
        aggregation:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/Aggregation'
        conditions:
          type:
          - object
          - 'null'
        multi_time_range:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/CompareHistoricData'
        promql:
          type:
          - string
          - 'null'
        promql_condition:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/Condition'
        search_event_type:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/SearchEventType'
        sql:
          type:
          - string
          - 'null'
        type:
          $ref: '#/components/schemas/QueryType'
        vrl_function:
          type:
          - string
          - 'null'
    ListAlertsResponseBodyItem:
      type: object
      description: 'An item in the list returned by the `ListAlerts` endpoint.


        For `scheduled` and `realtime` alert types, `condition` and

        `trigger_condition` are always present. For `anomaly_detection` items they

        are absent; use `last_trained_at` and `status` instead.'
      required:
      - alert_id
      - folder_id
      - folder_name
      - name
      - alert_type
      - enabled
      - is_real_time
      properties:
        alert_id:
          type: string
        alert_type:
          type: string
          description: 'Discriminator: "scheduled" | "realtime" | "anomaly_detection"'
        condition:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/QueryCondition'
        description:
          type:
          - string
          - 'null'
        enabled:
          type: boolean
        folder_id:
          type: string
        folder_name:
          type: string
        is_real_time:
          type: boolean
        last_error:
          type:
          - string
          - 'null'
          description: Last error message from training or detection. Only present for `anomaly_detection` items.
        last_satisfied_at:
          type:
          - integer
          - 'null'
          format: int64
        last_trained_at:
          type:
          - integer
          - 'null'
          format: int64
          description: 'Timestamp (µs) when the anomaly model was last successfully trained.

            Only present for `anomaly_detection` items.'
        last_triggered_at:
          type:
          - integer
          - 'null'
          format: int64
        name:
          type: string
        owner:
          type:
          - string
          - 'null'
        status:
          type:
          - string
          - 'null'
          description: 'Scheduler status string. Only present for `anomaly_detection` items.

            Values: "waiting" | "ready" | "training" | "failed" | "disabled"'
        trigger_condition:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/TriggerCondition'
    SemanticGroupModification:
      type: object
      required:
      - current
      - proposed
      properties:
        current:
          $ref: '#/components/schemas/FieldAlias'
          description: Current version in DB
        proposed:
          $ref: '#/components/schemas/FieldAlias'
          description: New version from import
    Alert:
      type: object
      properties:
        context_attributes:
          type:
          - object
          - 'null'
          default: null
          additionalProperties:
            type: string
          propertyNames:
            type: string
        creates_incident:
          type: boolean
          description: 'When true, this alert creates/joins incidents instead of sending direct notifications.

            Notification is sent only when a new incident is created or a new alert type joins

            an existing incident. Repeated firings are suppressed.

            When false (default), the alert sends notifications directly and does not correlate

            to any incident.'
          default: false
        deduplication:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/DeduplicationConfig'
          default: null
        description:
          type: string
          default: ''
        destinations:
          type: array
          items:
            type: string
          default: []
        enabled:
          type: boolean
          default: false
        id:
          type:
          - string
          - 'null'
          default: null
        is_real_time:
          type: boolean
          default: false
        last_edited_by:
          type:
          - string
          - 'null'
          default: null
        last_satisfied_at:
          type:
          - integer
          - 'null'
          format: int64
          description: Will be removed in the future.
          default: null
        last_triggered_at:
          type:
          - integer
          - 'null'
          format: int64
          description: Will be removed in the future.
          default: null
        name:
          type: string
          default: ''
        org_id:
          type: string
          default: ''
        owner:
          type:
          - string
          - 'null'
          default: null
        query_condition:
          oneOf:
          - $ref: '#/components/schemas/QueryCondition'
          default:
            type: custom
            conditions: null
            sql: null
            promql: null
            promql_condition: null
            aggregation: null
            vrl_function: null
            search_event_type: null
            multi_time_range: null
        row_template:
          type: string
          default: ''
        row_template_type:
          oneOf:
          - $ref: '#/components/schemas/RowTemplateType'
          default: String
        stream_name:
          type: string
          default: ''
        stream_type:
          oneOf:
          - $ref: '#/components/schemas/StreamType'
          default: logs
        template:
          type:
          - string
          - 'null'
          description: 'Optional template name. When specified, this template is used for all

            destinations instead of destination-level templates. This allows using

            different templates for different alerts while reusing the same destinations.'
          default: null
        trigger_condition:
          oneOf:
          - $ref: '#/components/schemas/TriggerCondition'
          default:
            period: 0
            operator: '='
            threshold: 0
            frequency: 0
            cron: ''
            frequency_type: minutes
            silence: 0
            tolerance_in_secs: null
            align_time: false
        tz_offset:
          type: integer
          format: int32
          description: 'Timezone offset in minutes.

            The negative secs means the Western Hemisphere'
          default: 0
        updated_at:
          type: string
          format: date-time
          default: null
    FieldAlias:
      type: object
      description: "Field alias group — defines a set of field names that represent the same concept.\n\nUsed for:\n- Mapping equivalent field names across logs, traces, and metrics (e.g., `service`,\n  `service.name`, `app` all mean \"service identity\")\n- Alert deduplication fingerprinting\n- Populating `ServiceIdentityConfig` and `IncidentGroupingConfig` via the recommendations UI\n\n# Field Name Overlaps\n\nField names can appear in multiple semantic groups. When extracting dimensions,\nthe **first-defined group** takes precedence. This allows flexible configurations\nwhere a field like \"service\" can have different meanings in different contexts.\n\nExample:\n```\n// Group 1: service-primary (defined first)\n//   field_names: [\"service\", \"primary_service\"]\n//\n// Group 2: service-backup (defined second)\n//   field_names: [\"service\", \"backup_service\"]\n//\n// When extracting dimensions from {\"service\": \"api\"}:\n// → Matches \"service-primary\" group (first occurrence wins)\n```"
      required:
      - id
      - display
      - fields
      properties:
        display:
          type: string
          description: Human-readable display name (e.g., "Host", "K8s Cluster")
        fields:
          type: array
          items:
            type: string
          description: 'List of field names that are equivalent (e.g., ["host", "hostname", "node"])


            Note: Field names can overlap with other groups. First-defined group wins.'
        group:
          type:
          - string
          - 'null'
          description: 'Category/group this semantic field belongs to (e.g., "Common", "Kubernetes", "AWS", "GCP",

            "Azure") Used for UI organization and preset templates'
        id:
          type: string
          description: Unique identifier (lowercase, dash-separated, e.g., "host", "k8s-cluster")
        is_workload_type:
          type: boolean
          description: 'When true, this alias is a workload-type dimension used to build identity sets.

            Aliases with this flag are grouped by their `group` field to form `IdentitySet`

            entries with `distinguish_by` populated from those alias IDs.

            Aliases without this flag (HTTP, Database, System, etc.) are never used as

            identity set discriminators.'
    SearchEventType:
      type: string
      enum:
      - ui
      - dashboards
      - reports
      - alerts
      - values
      - other
      - rum
      - derivedstream
      - searchjob
      - download
      - insights
    DeduplicationConfig:
      type: object
      description: 'Per-alert deduplication configuration (from main branch)


        This is stored on each Alert and specifies which fields to use for fingerprinting.

        This matches the structure from the main branch exactly.

        Configuration for alert deduplication'
      properties:
        enabled:
          type: boolean
          description: Enable/disable deduplication
          default: false
        fingerprint_fields:
          type: array
          items:
            type: string
          description: 'Fields from query results to use for fingerprinting

            If empty, auto-detect based on query type:

            - Custom: Fields from query conditions

            - SQL: GROUP BY columns

            - PromQL: All label dimensions'
          default: []
        grouping:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/GroupingConfig'
            description: Optional alert grouping configuration
          default: null
        time_window_minutes:
          type:
          - integer
          - 'null'
          format: int32
          description: 'Time window in minutes for deduplication

            If None, defaults to 2x alert frequency'
          default: null
    AlertHistoryEntry:
      type: object
      required:
      - timestamp
      - alert_name
      - org
      - status
      - is_realtime
      - is_silenced
      - start_time
      - end_time
      - retries
      properties:
        alert_name:
          type: string
        anomaly_count:
          type:
          - integer
          - 'null'
          format: int32
          description: Number of anomalies found in this evaluation run (anomaly detection only).
        dedup_count:
          type:
          - integer
          - 'null'
          format: int32
        dedup_enabled:
          type:
          - boolean
          - 'null'
        dedup_suppressed:
          type:
          - boolean
          - 'null'
        delay_in_secs:
          type:
          - integer
          - 'null'
          format: int64
        end_time:
          type: integer
          format: int64
        error:
          type:
          - string
          - 'null'
        evaluation_took_in_secs:
          type:
          - number
          - 'null'
          format: double
        group_size:
          type:
          - integer
          - 'null'
          format: int32
        grouped:
          type:
          - boolean
          - 'null'
        is_partial:
          type:
          - boolean
          - 'null'
        is_realtime:
          type: boolean
        is_silenced:
          type: boolean
        org:
          type: string
        query_took:
          type:
          - integer
          - 'null'
          format: int64
        retries:
          type: integer
          format: int32
        source_node:
          type:
          - string
          - 'null'
        start_time:
          type: integer
          format: int64
        status:
          type: string
        success_response:
          type:
          - string
          - 'null'
        timestamp:
          type: integer
          format: int64
    Aggregation:
      type: object
      required:
      - function
      - having
      properties:
        function:
          $ref: '#/components/schemas/AggFunction'
        group_by:
          type:
          - array
          - 'null'
          items:
            type: string
        having:
          $ref: '#/components/schemas/Condition'
    Condition:
      type: object
      required:
      - column
      - operator
      - value
      properties:
        column:
          type: string
        ignore_case:
          type: boolean
        operator:
          $ref: '#/components/schemas/Operator'
        value:
          type: object
    DedupSummaryResponse:
      type: object
      required:
      - total_alerts
      - alerts_with_dedup
      - suppressions_total
      - passed_total
      - suppression_rate
      - pending_batches
      - timestamp
      properties:
        alerts_with_dedup:
          type: integer
          description: Number of alerts with deduplication enabled
          minimum: 0
        passed_total:
          type: integer
          format: int64
          description: Total alerts that passed dedup in time period
        pending_batches:
          type: integer
          format: int64
          description: Current pending batches (grouping)
        suppression_rate:
          type: number
          format: double
          description: Suppression rate (0.0 to 1.0)
        suppressions_total:
          type: integer
          format: int64
          description: Total alerts suppressed in time period
        timestamp:
          type: integer
          format: int64
          description: Timestamp when data was collected
        total_alerts:
          type: integer
          description: Total number of alerts in organization
          minimum: 0
    CompareHistoricData:
      type: object
      required:
      - offSet
      properties:
        offSet:
          type: string
    HTTPOutputFormat:
      oneOf:
      - type: string
        enum:
        - json
      - type: string
        enum:
        - ndjson
      - type: string
        enum:
        - nestedevent
      - type: object
        required:
        - esbulk
        properties:
          esbulk:
            type: object
            required:
            - index
            properties:
              index:
                type: string
      - type: object
        required:
        - stringseparated
        properties:
          stringseparated:
            type: object
            required:
            - separator
            properties:
              separator:
                type: string
    SendStrategy:
      type: string
      description: Strategy for sending grouped alert notifications
      enum:
      - first_with_count
      - summary
      - all
    FrequencyType:
      type: string
      enum:
      - cron
      - minutes
    HTTPType:
      type: string
      enum:
      - post
      - put
      - get
    Operator:
      type: string
      enum:
      - '='
      - '!='
      - '>'
      - '>='
      - <
      - <=
      - contains
      - not_contains
    RowTemplateType:
      type: string
      enum:
      - String
      - Json
    GlobalDeduplicationConfig:
      type: object
      description: 'Organization-level deduplication configuration (Global settings)


        This configuration is stored at the organization level and defines:

        - Whether deduplication is enabled globally

        - Semantic field groups that map field name variations to canonical dimensions

        - Cross-alert deduplication based on shared semantic dimensions

        - Default time window for deduplication


        Per-alert fingerprint fields are stored in the Alert.deduplication field.'
      properties:
        alert_dedup_enabled:
          type: boolean
          description: 'Enable cross-alert deduplication based on shared semantic dimensions


            When true, alerts from DIFFERENT alert rules that share semantic dimensions

            will be deduplicated if one already fired recently.


            Example:

            - Alert A fires: {host: "srv01", service: "api"}

            - Alert B fires 30s later: {host: "srv01", region: "us-east"}

            - If cross_alert_dedup=true: Alert B suppressed (shares "host" dimension)

            - If cross_alert_dedup=false: Both sent (per-alert dedup only)'
          default: false
        alert_fingerprint_groups:
          type: array
          items:
            type: string
          description: 'Semantic group IDs to use for cross-alert fingerprinting


            When cross_alert_dedup is enabled, these semantic group IDs are used

            to generate fingerprints across all alerts (instead of per-alert fingerprint_fields).

            Must reference IDs from semantic field groups (stored in system_settings).


            Example: ["host", "service"] means fingerprint = hash(host_value + service_value)

            Required when cross_alert_dedup is true.'
          default: []
        enabled:
          type: boolean
          description: Enable/disable deduplication globally for this organization
          default: false
        time_window_minutes:
          type:
          - integer
          - 'null'
          format: int32
          description: 'Default time window in minutes for deduplication


            Alerts with the same fingerprint within this window are suppressed.

            If None, defaults to 2x the alert evaluation frequency.

            Can be overridden per-alert.'
          default: null
        upgrade_window_minutes:
          type: integer
          format: int64
          description: 'Time window for hierarchical incident upgrade (minutes)

            Incidents created within this window can be upgraded from weak to strong correlation keys.'
          default: 0
          minimum: 0
    UpdateAnomalyAlertFields:
      type: object
      description: Anomaly-detection-specific fields for `UpdateAlertRequestBody` (all optional).
      properties:
