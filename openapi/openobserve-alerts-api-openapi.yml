      - query_mode
      - detection_function
      - histogram_interval
      - schedule_interval
      - detection_window_seconds
      properties:
        alert_enabled:
          type:
          - boolean
          - 'null'
        custom_sql:
          type:
          - string
          - 'null'
        detection_function:
          type: string
          description: Aggregation function, e.g. "count(*)" or "avg(cpu_usage)"
        detection_function_field:
          type:
          - string
          - 'null'
          description: 'Field to aggregate (required for avg/sum/min/max/pXX, ignored for count).

            Combined with `detection_function` into "avg(field)" before saving.'
        detection_window_seconds:
          type: integer
          format: int64
          description: Look-back window per detection run, in seconds
        filters: {}
        histogram_interval:
          type: string
          description: SQL histogram bucket size, e.g. "5m", "1h"
        percentile:
          type:
          - number
          - 'null'
          format: double
          description: 'Percentile threshold (50.0–99.9). Default: 97.0

            Also accepts the name `threshold` (integer, e.g. 97) for API convenience.'
        query_mode:
          type: string
          description: '"filters" or "custom_sql"'
        rcf_num_trees:
          type:
          - integer
          - 'null'
          format: int32
        rcf_shingle_size:
          type:
          - integer
          - 'null'
          format: int32
        rcf_tree_size:
          type:
          - integer
          - 'null'
          format: int32
        retrain_interval_days:
          type:
          - integer
          - 'null'
          format: int32
          description: 0 = never retrain automatically; otherwise days between retrains
        schedule_interval:
          type: string
          description: How often the detection job fires, e.g. "1h", "30m"
        training_window_days:
          type:
          - integer
          - 'null'
          format: int32
  securitySchemes:
    Authorization:
      type: apiKey
      in: header
      name: Authorization
    BasicAuth:
      type: http
      scheme: basic
